<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App QR Code</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        h1 { margin-top: 0; background: linear-gradient(90deg, #ff7e5f, #feb47b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #qr-container { margin: 2rem 0; background: white; padding: 1rem; border-radius: 8px; display: inline-block; }
        img { display: block; max-width: 100%; height: auto; }
        .instructions { font-size: 0.9rem; color: #8b949e; max-width: 300px; margin: 0 auto; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Share Prism</h1>
        <div id="qr-container">
            <img id="qr-image" src="" alt="Loading QR code..." width="250" height="250">
        </div>
        <p class="instructions">Scan this QR code to access your application securely from any device.<br><br>The code automatically adapts to your current live domain!</p>
    </div>

    <script>
        // Dynamically generated QR code using the current browser URL origin
        const currentUrl = window.location.origin;
        const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(currentUrl)}&margin=0`;
        document.getElementById('qr-image').src = qrApi;
    </script>
</body>
</html>
